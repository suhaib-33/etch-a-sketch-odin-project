<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Etch a sketch project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="flex-container">
        <div class="title"> <h1> Sketch Board</h1> </div>
        <div class="content">
            <div class="board"></div>
            <div class="buttons">
                <button onclick="changeColor (`black`)"> Black</button>
                <button onclick="changeColor (`white`)"> White</button>
                <button onclick="changeColor (`grey`)"> Grey </button>
                <button onclick="changeColor (`random`)"> Random</button>
                <button onclick="resetBoard ()"> Reset</button>
            </div>
            <div class = "size">
                <input type="text" placeholder="Size of board" value="16" onchange="changeSize(this.value)"/>
                <button>Set Size</button>
            </div>
        </div>
    </div>
    
</body>
<script src="java.js"></script>
</html>
